version: 2
updates:
  # Dépendances Python (met à jour requirements.in, à recompiler ensuite)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"
    # Quarantaine anti-supply-chain : on n'adopte pas une version le jour de sa
    # sortie (fenêtre où une compromission n'est pas encore détectée).
    cooldown:
      default-days: 7
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 3

  # Actions GitHub : Dependabot remonte les SHA épinglés vers la dernière version
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "github-actions"
    cooldown:
      default-days: 7
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 3

  # Image de base du Dockerfile (suit le digest)
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "docker"
    cooldown:
      default-days: 7
